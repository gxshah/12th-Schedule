<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Study Schedule</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f0f13;
    --surface: #1a1a22;
    --border: #2e2e3e;
    --accent: #c8f060;
    --accent2: #60c8f0;
    --accent3: #f060c8;
    --text: #e8e8f0;
    --muted: #6b6b80;
  }
 
  * { box-sizing: border-box; margin: 0; padding: 0; }
 
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    min-height: 100vh;
    padding: 32px 24px;
  }
 
  header {
    margin-bottom: 28px;
    display: flex;
    align-items: flex-end;
    gap: 20px;
    flex-wrap: wrap;
  }
 
  header h1 {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 2.2rem;
    letter-spacing: -1px;
    color: var(--accent);
    line-height: 1;
  }
 
  header p {
    color: var(--muted);
    font-size: 0.78rem;
    margin-bottom: 4px;
  }
 
  .month-selector {
    margin-left: auto;
    display: flex;
    gap: 8px;
  }
 
  .month-btn {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--muted);
    font-family: 'Syne', sans-serif;
    font-weight: 600;
    font-size: 0.8rem;
    padding: 6px 16px;
    border-radius: 6px;
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 0.5px;
  }
 
  .month-btn.active {
    background: var(--accent);
    color: #0f0f13;
    border-color: var(--accent);
  }
 
  .month-btn:hover:not(.active) {
    border-color: var(--accent);
    color: var(--accent);
  }
 
  .wrapper {
    overflow-x: auto;
    border-radius: 12px;
    border: 1px solid var(--border);
  }
 
  table {
    border-collapse: collapse;
    width: 100%;
  }
 
  /* Header */
  thead tr th {
    background: var(--surface);
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 0.8rem;
    color: var(--muted);
    padding: 12px 0;
    text-align: center;
    border-right: 1px solid var(--border);
    border-bottom: 2px solid var(--accent);
    letter-spacing: 1px;
    position: sticky;
    top: 0;
    z-index: 10;
  }
 
  thead tr th:first-child {
    min-width: 140px;
    text-align: left;
    padding-left: 14px;
    position: sticky;
    left: 0;
    z-index: 20;
    background: var(--surface);
  }
 
  .week-th {
    min-width: 80px;
    width: 120px;
  }
 
  .week-th-1 { color: #c8f060 !important; border-left: 2px solid #c8f060 !important; border-right: 2px solid #c8f060 !important; }
  .week-th-2 { color: #60c8f0 !important; border-left: 2px solid #60c8f0 !important; border-right: 2px solid #60c8f0 !important; }
  .week-th-3 { color: #f060c8 !important; border-left: 2px solid #f060c8 !important; border-right: 2px solid #f060c8 !important; }
  .week-th-4 { color: #f0c860 !important; border-left: 2px solid #f0c860 !important; border-right: 2px solid #f0c860 !important; }
 
  /* Day label */
  .day-label-cell {
    position: sticky;
    left: 0;
    z-index: 5;
    background: var(--surface);
    border-right: 2px solid var(--accent);
    padding: 0;
    vertical-align: middle;
    min-width: 140px;
  }
 
  .day-label-inner {
    display: flex;
    flex-direction: column;
    align-items: flex-start;
    padding: 12px 14px;
    gap: 2px;
  }
 
  .day-name {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 0.95rem;
    color: var(--text);
    letter-spacing: 0.5px;
    text-transform: uppercase;
  }
 
  .day-abbr {
    font-size: 0.65rem;
    color: var(--muted);
  }
 
  /* Subject rows */
  tbody tr {
    border-bottom: 1px solid var(--border);
    transition: background 0.15s;
  }
 
  tbody tr.sub-row-last {
    border-bottom: 3px solid var(--border);
  }
 
  tbody tr:hover td:not(.day-label-cell) {
    background: #222230;
  }
 
  .subject-label-cell {
    position: sticky;
    left: 0;
    z-index: 4;
    padding: 0;
    border-right: 1px solid var(--border);
    min-width: 140px;
  }
 
  tr[data-sub="0"] .subject-label-cell { background: #1b1b25; }
  tr[data-sub="1"] .subject-label-cell { background: #1d1d28; }
  tr[data-sub="2"] .subject-label-cell { background: #1a1a24; }
  tr[data-sub="3"] .subject-label-cell { background: #1c1c27; }
 
  .subject-label-wrap {
    position: relative;
    display: flex;
    align-items: center;
  }
 
  .dot {
    position: absolute;
    left: 14px;
    top: 50%;
    transform: translateY(-50%);
    width: 6px;
    height: 6px;
    border-radius: 50%;
    pointer-events: none;
  }
 
  tr[data-sub="0"] .dot { background: var(--accent); }
  tr[data-sub="1"] .dot { background: var(--accent2); }
  tr[data-sub="2"] .dot { background: var(--accent3); }
  tr[data-sub="3"] .dot { background: #f0c860; }
 
  .subject-label-cell input[type="text"] {
    width: 100%;
    background: transparent;
    border: none;
    outline: none;
    font-family: 'DM Mono', monospace;
    font-size: 0.72rem;
    color: var(--text);
    padding: 9px 14px 9px 28px;
    cursor: text;
  }
 
  .subject-label-cell input[type="text"]::placeholder {
    color: var(--muted);
    opacity: 0.6;
  }
 
  /* Checkbox cells */
  td.check-cell {
    text-align: center;
    vertical-align: middle;
    padding: 8px 4px;
    border-right: 1px solid var(--border);
    width: 120px;
  }
 
  td.week-1-cell { border-left: 2px solid #c8f06040; border-right: 2px solid #c8f06040; }
  td.week-2-cell { border-left: 2px solid #60c8f040; border-right: 2px solid #60c8f040; }
  td.week-3-cell { border-left: 2px solid #f060c840; border-right: 2px solid #f060c840; }
  td.week-4-cell { border-left: 2px solid #f0c86040; border-right: 2px solid #f0c86040; }
 
  input[type="checkbox"] {
    appearance: none;
    -webkit-appearance: none;
    width: 20px;
    height: 20px;
    border: 1.5px solid var(--border);
    border-radius: 5px;
    cursor: pointer;
    transition: all 0.15s;
    position: relative;
    display: block;
    margin: 0 auto;
  }
 
  input[type="checkbox"]:hover {
    border-color: var(--accent);
  }
 
  input[type="checkbox"]:checked {
    background: var(--accent);
    border-color: var(--accent);
  }
 
  input[type="checkbox"]:checked::after {
    content: '';
    position: absolute;
    left: 4px;
    top: 2px;
    width: 9px;
    height: 6px;
    border-left: 2px solid #0f0f13;
    border-bottom: 2px solid #0f0f13;
    transform: rotate(-45deg);
  }
 
  /* Progress */
  .progress-bar-wrap {
    margin-top: 20px;
    display: flex;
    align-items: center;
    gap: 14px;
  }
 
  .progress-label {
    font-family: 'Syne', sans-serif;
    font-size: 0.75rem;
    color: var(--muted);
    white-space: nowrap;
  }
 
  .progress-bar {
    flex: 1;
    height: 6px;
    background: var(--border);
    border-radius: 3px;
    overflow: hidden;
  }
 
  .progress-fill {
    height: 100%;
    background: var(--accent);
    border-radius: 3px;
    transition: width 0.3s ease;
    width: 0%;
  }
 
  .progress-pct {
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 0.8rem;
    color: var(--accent);
    min-width: 36px;
    text-align: right;
  }
 
  .actions {
    margin-top: 16px;
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
  }
 
  .btn {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--muted);
    font-family: 'DM Mono', monospace;
    font-size: 0.72rem;
    padding: 6px 14px;
    border-radius: 6px;
    cursor: pointer;
    transition: all 0.2s;
  }
 
  .btn:hover { border-color: var(--accent3); color: var(--accent3); }
  .btn.danger:hover { border-color: #f06060; color: #f06060; }
</style>
</head>
<body>
 
<header>
  <div>
    <p>WAZIRI EXAM PREP</p>
    <h1>STUDY SCHEDULE</h1>
  </div>
  <div class="month-selector">
    <button class="month-btn active" onclick="setMonth(0)">JUNE</button>
    <button class="month-btn" onclick="setMonth(1)">JULY</button>
    <button class="month-btn" onclick="setMonth(2)">AUGUST</button>
  </div>
</header>
 
<div class="wrapper">
  <table id="scheduleTable">
    <thead id="tableHead"></thead>
    <tbody id="tableBody"></tbody>
  </table>
</div>
 
<div class="progress-bar-wrap">
  <span class="progress-label">MONTHLY PROGRESS</span>
  <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
  <span class="progress-pct" id="progressPct">0%</span>
</div>
 
<div class="actions">
  <button class="btn danger" onclick="resetMonth()">RESET MONTH</button>
</div>
 
<script>
const DAYS = ['Saturday','Sunday','Monday','Tuesday','Wednesday','Thursday','Friday'];
const DAYS_SHORT = ['SAT','SUN','MON','TUE','WED','THU','FRI'];
const MONTHS = ['june','july','august'];
const WEEKS = ['WEEK 1','WEEK 2','WEEK 3','WEEK 4'];
const WEEK_COLORS = ['#c8f060','#60c8f0','#f060c8','#f0c860'];
const WEEK_CLASSES = ['week-1-cell','week-2-cell','week-3-cell','week-4-cell'];
 
let currentMonth = 0;
 
function storageKey(month, weekIdx, dayIdx, subIdx) {
  return `v2_schedule_${month}_wk${weekIdx}_d${dayIdx}_s${subIdx}`;
}
 
function labelKey(month, dayIdx, subIdx) {
  return `label_${month}_w${dayIdx}_s${subIdx}`;
}
 
function setMonth(m) {
  currentMonth = m;
  document.querySelectorAll('.month-btn').forEach((b,i) => b.classList.toggle('active', i===m));
  buildTable();
}
 
function buildTable() {
  const month = MONTHS[currentMonth];
  const head = document.getElementById('tableHead');
  const body = document.getElementById('tableBody');
  head.innerHTML = '';
  body.innerHTML = '';
 
  // Header row: DAYS | SUBJECTS | WEEK 1 | WEEK 2 | WEEK 3 | WEEK 4
  const headRow = document.createElement('tr');
 
  const daysTh = document.createElement('th');
  daysTh.textContent = 'DAYS';
  headRow.appendChild(daysTh);
 
  const subjectsTh = document.createElement('th');
  subjectsTh.textContent = 'SUBJECTS';
  headRow.appendChild(subjectsTh);
 
  WEEKS.forEach((wk, i) => {
    const th = document.createElement('th');
    th.textContent = wk;
    th.className = `week-th week-th-${i+1}`;
    headRow.appendChild(th);
  });
  head.appendChild(headRow);
 
  // Body: 7 days × 4 sub-rows, each sub-row has 4 week checkboxes
  for (let d = 0; d < 7; d++) {
    for (let s = 0; s < 4; s++) {
      const tr = document.createElement('tr');
      tr.dataset.sub = s;
      if (s === 3) tr.classList.add('sub-row-last');
 
      // Day label cell (spans 4 sub-rows)
      if (s === 0) {
        const td = document.createElement('td');
        td.className = 'day-label-cell';
        td.rowSpan = 4;
        td.innerHTML = `<div class="day-label-inner">
          <span class="day-name">${DAYS[d]}</span>
          <span class="day-abbr">${DAYS_SHORT[d]}</span>
        </div>`;
        tr.appendChild(td);
      }
 
      // Subject label cell
      const labelTd = document.createElement('td');
      labelTd.className = 'subject-label-cell';
      const savedLabel = localStorage.getItem(labelKey(currentMonth, d, s)) || '';
      labelTd.innerHTML = `<div class="subject-label-wrap">
        <span class="dot"></span>
        <input type="text" placeholder="Subject ${s+1}..." value="${savedLabel}"
          oninput="saveLabel(${currentMonth},${d},${s},this.value)">
      </div>`;
      tr.appendChild(labelTd);
 
      // 4 week checkbox cells
      for (let w = 0; w < 4; w++) {
        const td = document.createElement('td');
        td.className = `check-cell ${WEEK_CLASSES[w]}`;
 
        const key = storageKey(currentMonth, w, d, s);
        const isChecked = localStorage.getItem(key) === '1';
        const cb = document.createElement('input');
        cb.type = 'checkbox';
        cb.checked = isChecked;
        cb.addEventListener('change', function() {
          localStorage.setItem(key, this.checked ? '1' : '0');
          updateProgress();
        });
        td.appendChild(cb);
        tr.appendChild(td);
      }
 
      body.appendChild(tr);
    }
  }
 
  updateProgress();
}
 
function saveLabel(month, dayIdx, subIdx, value) {
  localStorage.setItem(labelKey(month, dayIdx, subIdx), value);
}
 
function updateProgress() {
  const allCheckboxes = document.querySelectorAll('#tableBody input[type="checkbox"]');
  const total = allCheckboxes.length;
  let checked = 0;
  allCheckboxes.forEach(cb => { if (cb.checked) checked++; });
  const pct = total > 0 ? Math.round((checked / total) * 100) : 0;
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressPct').textContent = pct + '%';
}
 
function resetMonth() {
  if (!confirm('Reset all checkboxes for this month?')) return;
  for (let w = 0; w < 4; w++) {
    for (let d = 0; d < 7; d++) {
      for (let s = 0; s < 4; s++) {
        localStorage.removeItem(storageKey(currentMonth, w, d, s));
      }
    }
  }
  buildTable();
}
 
buildTable();
</script>
</body>
</html>
