<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Study Schedule</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f0f13;
    --surface: #1a1a22;
    --border: #2e2e3e;
    --accent: #c8f060;
    --accent2: #60c8f0;
    --accent3: #f060c8;
    --text: #e8e8f0;
    --muted: #6b6b80;
    --checked: #c8f060;
    --row1: #1e1e2a;
    --row2: #1a1a24;
  }
 
  * { box-sizing: border-box; margin: 0; padding: 0; }
 
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    min-height: 100vh;
    padding: 32px 24px;
  }
 
  header {
    margin-bottom: 28px;
    display: flex;
    align-items: flex-end;
    gap: 20px;
    flex-wrap: wrap;
  }
 
  header h1 {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 2.2rem;
    letter-spacing: -1px;
    color: var(--accent);
    line-height: 1;
  }
 
  header p {
    color: var(--muted);
    font-size: 0.78rem;
    margin-bottom: 4px;
  }
 
  .month-selector {
    margin-left: auto;
    display: flex;
    gap: 8px;
  }
 
  .month-btn {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--muted);
    font-family: 'Syne', sans-serif;
    font-weight: 600;
    font-size: 0.8rem;
    padding: 6px 16px;
    border-radius: 6px;
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 0.5px;
  }
 
  .month-btn.active {
    background: var(--accent);
    color: #0f0f13;
    border-color: var(--accent);
  }
 
  .month-btn:hover:not(.active) {
    border-color: var(--accent);
    color: var(--accent);
  }
 
  .wrapper {
    overflow-x: auto;
    border-radius: 12px;
    border: 1px solid var(--border);
  }
 
  table {
    border-collapse: collapse;
    min-width: 100%;
  }
 
  /* Day number header row */
  thead tr th {
    background: var(--surface);
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 0.72rem;
    color: var(--muted);
    padding: 10px 0;
    text-align: center;
    border-right: 1px solid var(--border);
    border-bottom: 2px solid var(--accent);
    min-width: 38px;
    letter-spacing: 0.5px;
    position: sticky;
    top: 0;
    z-index: 10;
  }
 
  thead tr th.day-num.today {
    color: var(--accent);
    background: #1e261a;
  }
 
  thead tr th:first-child {
    min-width: 160px;
    text-align: left;
    padding-left: 14px;
    position: sticky;
    left: 0;
    z-index: 20;
    background: var(--surface);
  }
 
  /* Day of week group */
  .day-label-cell {
    position: sticky;
    left: 0;
    z-index: 5;
    background: var(--surface);
    border-right: 2px solid var(--accent);
    padding: 0;
    vertical-align: middle;
  }
 
  .day-label-inner {
    display: flex;
    flex-direction: column;
    align-items: flex-start;
    padding: 12px 14px;
    gap: 2px;
  }
 
  .day-name {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 0.95rem;
    color: var(--text);
    letter-spacing: 0.5px;
    text-transform: uppercase;
  }
 
  .day-abbr {
    font-size: 0.65rem;
    color: var(--muted);
    font-weight: 400;
  }
 
  /* Sub-row (subject row) */
  tbody tr {
    border-bottom: 1px solid var(--border);
    transition: background 0.15s;
  }
 
  tbody tr:last-child {
    border-bottom: 2px solid var(--border);
  }
 
  tbody tr.sub-row-last {
    border-bottom: 2px solid var(--border);
  }
 
  tbody tr:hover td:not(.day-label-cell) {
    background: #222230;
  }
 
  .subject-label-cell {
    position: sticky;
    left: 0;
    z-index: 4;
    padding: 0;
    border-right: 1px solid var(--border);
    background: var(--row1);
    min-width: 160px;
  }
 
  .subject-label-cell input[type="text"] {
    width: 100%;
    background: transparent;
    border: none;
    outline: none;
    font-family: 'DM Mono', monospace;
    font-size: 0.72rem;
    color: var(--text);
    padding: 9px 14px 9px 28px;
    cursor: text;
  }
 
  .subject-label-cell input[type="text"]::placeholder {
    color: var(--muted);
    opacity: 0.6;
  }
 
  .subject-label-cell .dot {
    position: absolute;
    left: 14px;
    top: 50%;
    transform: translateY(-50%);
    width: 6px;
    height: 6px;
    border-radius: 50%;
    pointer-events: none;
  }
 
  .subject-label-cell {
    position: sticky;
    left: 0;
    z-index: 4;
    padding: 0;
    border-right: 1px solid var(--border);
  }
 
  .subject-label-wrap {
    position: relative;
    display: flex;
    align-items: center;
  }
 
  /* Colors for 4 sub-rows */
  tr[data-sub="0"] .subject-label-cell { background: #1b1b25; }
  tr[data-sub="1"] .subject-label-cell { background: #1d1d28; }
  tr[data-sub="2"] .subject-label-cell { background: #1a1a24; }
  tr[data-sub="3"] .subject-label-cell { background: #1c1c27; }
 
  tr[data-sub="0"] .dot { background: var(--accent); }
  tr[data-sub="1"] .dot { background: var(--accent2); }
  tr[data-sub="2"] .dot { background: var(--accent3); }
  tr[data-sub="3"] .dot { background: #f0c860; }
 
  /* Checkbox cells */
  td.check-cell {
    text-align: center;
    vertical-align: middle;
    padding: 6px 2px;
    border-right: 1px solid var(--border);
    min-width: 38px;
  }
 
  td.check-cell.rest-day {
    background: repeating-linear-gradient(
      45deg,
      transparent,
      transparent 4px,
      #1e1e2a 4px,
      #1e1e2a 8px
    );
  }
 
  td.check-cell.rest-day input { display: none; }
 
  input[type="checkbox"] {
    appearance: none;
    -webkit-appearance: none;
    width: 16px;
    height: 16px;
    border: 1.5px solid var(--border);
    border-radius: 4px;
    cursor: pointer;
    transition: all 0.15s;
    position: relative;
    display: block;
    margin: 0 auto;
  }
 
  input[type="checkbox"]:hover {
    border-color: var(--accent);
  }
 
  input[type="checkbox"]:checked {
    background: var(--accent);
    border-color: var(--accent);
  }
 
  input[type="checkbox"]:checked::after {
    content: '';
    position: absolute;
    left: 3px;
    top: 1px;
    width: 8px;
    height: 5px;
    border-left: 2px solid #0f0f13;
    border-bottom: 2px solid #0f0f13;
    transform: rotate(-45deg);
  }
 
  /* Sunday styling */
  td.sunday-col, th.sunday-col {
    background: #1e1a1a !important;
    border-right: 2px solid #3e2e2e !important;
  }
 
  td.sunday-col input[type="checkbox"] {
    border-color: #3e2e2e;
    opacity: 0.4;
    cursor: not-allowed;
  }
 
  /* Progress bar */
  .progress-bar-wrap {
    margin-top: 20px;
    display: flex;
    align-items: center;
    gap: 14px;
  }
 
  .progress-label {
    font-family: 'Syne', sans-serif;
    font-size: 0.75rem;
    color: var(--muted);
    white-space: nowrap;
  }
 
  .progress-bar {
    flex: 1;
    height: 6px;
    background: var(--border);
    border-radius: 3px;
    overflow: hidden;
  }
 
  .progress-fill {
    height: 100%;
    background: var(--accent);
    border-radius: 3px;
    transition: width 0.3s ease;
    width: 0%;
  }
 
  .progress-pct {
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 0.8rem;
    color: var(--accent);
    min-width: 36px;
    text-align: right;
  }
 
  /* Reset button */
  .actions {
    margin-top: 16px;
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
  }
 
  .btn {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--muted);
    font-family: 'DM Mono', monospace;
    font-size: 0.72rem;
    padding: 6px 14px;
    border-radius: 6px;
    cursor: pointer;
    transition: all 0.2s;
  }
 
  .btn:hover {
    border-color: var(--accent3);
    color: var(--accent3);
  }
 
  .btn.danger:hover {
    border-color: #f06060;
    color: #f06060;
  }
 
  /* Today highlight */
  th.today-col {
    color: var(--accent) !important;
    background: #1a2218 !important;
  }
 
  td.today-col {
    background: rgba(200, 240, 96, 0.04);
  }
</style>
</head>
<body>
 
<header>
  <div>
    <p>WAZIRI EXAM PREP</p>
    <h1>STUDY SCHEDULE</h1>
  </div>
  <div class="month-selector">
    <button class="month-btn active" onclick="setMonth(0)">JUNE</button>
    <button class="month-btn" onclick="setMonth(1)">JULY</button>
    <button class="month-btn" onclick="setMonth(2)">AUGUST</button>
  </div>
</header>
 
<div class="wrapper">
  <table id="scheduleTable">
    <thead id="tableHead"></thead>
    <tbody id="tableBody"></tbody>
  </table>
</div>
 
<div class="progress-bar-wrap">
  <span class="progress-label">MONTHLY PROGRESS</span>
  <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
  <span class="progress-pct" id="progressPct">0%</span>
</div>
 
<div class="actions">
  <button class="btn" onclick="checkAll()">CHECK ALL TODAY</button>
  <button class="btn danger" onclick="resetMonth()">RESET MONTH</button>
</div>
 
<script>
const DAYS = ['Saturday','Sunday','Monday','Tuesday','Wednesday','Thursday','Friday'];
const DAYS_SHORT = ['SAT','SUN','MON','TUE','WED','THU','FRI'];
const MONTHS = ['june','july','august'];
const MONTH_DAYS = [30, 31, 31]; // June=30, July=31, Aug=31
 
let currentMonth = 0;
 
function storageKey(month, day, dayIdx, subIdx) {
  return `schedule_${month}_d${day}_w${dayIdx}_s${subIdx}`;
}
 
function labelKey(month, dayIdx, subIdx) {
  return `label_${month}_w${dayIdx}_s${subIdx}`;
}
 
function setMonth(m) {
  currentMonth = m;
  document.querySelectorAll('.month-btn').forEach((b,i) => b.classList.toggle('active', i===m));
  buildTable();
}
 
function buildTable() {
  const month = MONTHS[currentMonth];
  const numDays = MONTH_DAYS[currentMonth];
  const head = document.getElementById('tableHead');
  const body = document.getElementById('tableBody');
  head.innerHTML = '';
  body.innerHTML = '';
 
  // Header row: day numbers
  const headRow = document.createElement('tr');
  const cornerTh = document.createElement('th');
  cornerTh.textContent = 'SUBJECT';
  cornerTh.style.textAlign = 'left';
  headRow.appendChild(cornerTh);
 
  for (let d = 1; d <= numDays; d++) {
    const th = document.createElement('th');
    th.textContent = d;
    th.className = 'day-num';
    // Sunday = every 7th day starting from offset based on month start
    // Just mark column visually; actual rest day logic per row
    headRow.appendChild(th);
  }
  head.appendChild(headRow);
 
  // Body: 7 days × 4 sub-rows each
  for (let w = 0; w < 7; w++) {
    for (let s = 0; s < 4; s++) {
      const tr = document.createElement('tr');
      tr.dataset.sub = s;
      if (s === 3) tr.classList.add('sub-row-last');
 
      // Left cell: day label (only first sub-row) OR subject label
      if (s === 0) {
        const td = document.createElement('td');
        td.className = 'day-label-cell';
        td.rowSpan = 4;
        td.innerHTML = `<div class="day-label-inner">
          <span class="day-name">${DAYS[w]}</span>
          <span class="day-abbr">${DAYS_SHORT[w]}</span>
        </div>`;
        tr.appendChild(td);
      }
 
      // Subject label cell
      const labelTd = document.createElement('td');
      labelTd.className = 'subject-label-cell';
      const savedLabel = localStorage.getItem(labelKey(currentMonth, w, s)) || '';
      const colors = ['var(--accent)','var(--accent2)','var(--accent3)','#f0c860'];
      labelTd.innerHTML = `<div class="subject-label-wrap">
        <span class="dot" style="background:${colors[s]}"></span>
        <input type="text" placeholder="Subject ${s+1}..." value="${savedLabel}"
          onchange="saveLabel(${currentMonth},${w},${s},this.value)"
          oninput="saveLabel(${currentMonth},${w},${s},this.value)">
      </div>`;
      tr.appendChild(labelTd);
 
      // Checkbox cells for each day
      for (let d = 1; d <= numDays; d++) {
        const td = document.createElement('td');
        td.className = 'check-cell';
 
        const key = storageKey(currentMonth, d, w, s);
        const checked = localStorage.getItem(key) === '1';
        const cb = document.createElement('input');
        cb.type = 'checkbox';
        cb.checked = checked;
        cb.addEventListener('change', function() {
          localStorage.setItem(key, this.checked ? '1' : '0');
          updateProgress();
        });
        td.appendChild(cb);
        tr.appendChild(td);
      }
 
      body.appendChild(tr);
    }
  }
 
  updateProgress();
}
 
function saveLabel(month, dayIdx, subIdx, value) {
  localStorage.setItem(labelKey(month, dayIdx, subIdx), value);
}
 
function updateProgress() {
  const allCheckboxes = document.querySelectorAll('#tableBody input[type="checkbox"]:not(:disabled)');
  const total = allCheckboxes.length;
  let checked = 0;
  allCheckboxes.forEach(cb => { if (cb.checked) checked++; });
  const pct = total > 0 ? Math.round((checked / total) * 100) : 0;
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressPct').textContent = pct + '%';
}
 
function checkAll() {
  const today = new Date().getDate();
  const numDays = MONTH_DAYS[currentMonth];
  if (today < 1 || today > numDays) return;
  for (let w = 0; w < 6; w++) {
    for (let s = 0; s < 4; s++) {
      localStorage.setItem(storageKey(currentMonth, today, w, s), '1');
    }
  }
  buildTable();
}
 
function resetMonth() {
  if (!confirm('Reset all checkboxes for this month?')) return;
  const numDays = MONTH_DAYS[currentMonth];
  for (let w = 0; w < 7; w++) {
    for (let s = 0; s < 4; s++) {
      for (let d = 1; d <= numDays; d++) {
        localStorage.removeItem(storageKey(currentMonth, d, w, s));
      }
    }
  }
  buildTable();
}
 
buildTable();
</script>
</body>
</html>
